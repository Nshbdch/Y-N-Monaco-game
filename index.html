<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yuri & Neil Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="stars"></div>
    <div class="nebula"></div>
    <div class="aurora"></div>
    <div class="smoke-layer"></div>
    <div class="meteor-layer"></div>
    <div class="shooting-stars"></div>
    <div class="floating-particles"></div>

    <main class="app-shell">
      <header class="brand-bar">
        <h1>YURI & NEIL</h1>
        <p>Arcade 90s Edition</p>
      </header>

      <section id="accessScreen" class="panel access-panel active">
        <h2>Entrez votre email pour jouer</h2>
        <form id="participantLoginForm" class="participant-login" autocomplete="off">
          <label for="participantEmail">Email participant</label>
          <input id="participantEmail" type="email" placeholder="prenom@entreprise.com" required />
          <button type="submit" class="neon-btn">Accéder au jeu</button>
          <p id="participantLoginError" class="error-msg"></p>
        </form>

        <form id="adminLoginForm" class="admin-login hidden" autocomplete="off">
          <label for="adminPassword">Mot de passe admin</label>
          <input id="adminPassword" type="password" placeholder="••••••••••" required />
          <button type="submit" class="neon-btn">Se connecter</button>
          <p id="adminLoginError" class="error-msg"></p>
        </form>
      </section>

      <section id="adminScreen" class="panel hidden">
        <div class="panel-head">
          <h2>Configuration des lots</h2>
          <button id="backToHomeFromAdmin" class="mini-btn">Retour</button>
        </div>

        <form id="prizeForm" class="prize-form" autocomplete="off">
          <div class="field-row">
            <label for="prizeName">Mot/Lot</label>
            <input id="prizeName" type="text" maxlength="24" placeholder="Ex: Casque Astro" required />
          </div>
          <div class="field-row">
            <label for="prizeRate">Winrate (%)</label>
            <input id="prizeRate" type="number" min="0" max="100" step="0.1" placeholder="Ex: 12.5" required />
          </div>
          <div class="field-row">
            <label for="prizeQuantity">Quantité disponible</label>
            <input id="prizeQuantity" type="number" min="0" step="1" placeholder="Ex: 100" required />
          </div>
          <button type="submit" class="neon-btn">Ajouter / Mettre à jour</button>
        </form>

        <div class="admin-stats" id="adminStats"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Lot</th>
                <th>Winrate</th>
                <th>Stock</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="prizeTableBody"></tbody>
          </table>
        </div>

        <div class="panel-head">
          <h2>Gagnants</h2>
          <div class="access-actions">
            <button id="exportWinnersBtn" type="button" class="mini-btn">Exporter Excel</button>
            <button id="clearWinnersBtn" type="button" class="mini-btn">Vider les gagnants</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Lot gagné</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="winnerTableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="gameScreen" class="panel hidden">
        <div class="panel-head game-head">
        </div>

        <div class="arcade-stage">
          <div class="arcade-cabinet">
            <div class="cabinet-marquee">
              <p>YURI & NEIL</p>
              <span>Arcade Experience</span>
            </div>

            <div class="cabinet-screen-frame">
              <div class="screen-bezel">
                <div class="slot-wrapper">
                  <div class="slot-machine" id="slotMachine">
                    <div class="scanlines"></div>
                    <div class="lives-hud">
                      <span class="lives-label">CREDIT</span>
                      <div id="livesHearts" class="lives-hearts"></div>
                    </div>
                    <div class="reels" id="reels"></div>
                    <div id="statusBanner" class="status-banner">Tire le levier pour lancer la machine</div>
                  </div>

                  <div class="lever-stack">
                    <button id="lever" class="lever" aria-label="Tirer le levier">
                      <span class="lever-stick"></span>
                      <span class="lever-knob"></span>
                    </button>
                    <span class="pull-here">PULL</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="cabinet-controls">
              <div class="button-row">
                <span class="arcade-btn red"></span>
                <span class="arcade-btn yellow"></span>
                <span class="arcade-btn green"></span>
                <span class="arcade-btn blue"></span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="terminalScreen" class="panel hidden terminal-panel">
        <div class="terminal-shell">
          <p class="terminal-title">MISSION TERMINAL</p>
          <div id="terminalBody" class="terminal-body"></div>
          <button id="terminalBackToHome" class="neon-btn">Retour à l'accueil</button>
        </div>
      </section>
    </main>
    <div id="resultOverlay" class="result-overlay" aria-live="polite">
      <div id="resultText" class="result-text"></div>
      <div id="confettiLayer" class="confetti-layer"></div>
    </div>
    <div id="alarmFlash" class="alarm-flash"></div>
    <button id="quickAdminBtn" class="admin-fab" type="button" aria-label="Accès admin">⚙️</button>

    <script src="app.js"></script>
  </body>
</html>
